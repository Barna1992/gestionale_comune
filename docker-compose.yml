services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gestionale}
      - POSTGRES_USER=${POSTGRES_USER:-gestionale}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gestionale}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestionale} -d ${POSTGRES_DB:-gestionale}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    entrypoint: /app/entrypoint.sh
    command: gunicorn gestione_comune.wsgi:application --bind 0.0.0.0:8000 --workers 2
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=gestione_comune.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-gestionale}:${POSTGRES_PASSWORD:-gestionale}@db:5432/${POSTGRES_DB:-gestionale}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_files:
  media_files:
