services:
  - type: web
    name: gestionale-comune
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: gestione_comune.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://gestionale-comune.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: DEBUG
        value: "False"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@comune.domegge.bl.it
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
